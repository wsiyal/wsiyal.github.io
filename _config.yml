# Jekyll Configuration
# Personal website for Wajid Siyal

title: "Wajid Siyal — Computational Physics & Software"
description: "PhD student in fluid dynamics. Research in LBM, PINNs, Bayesian optimization, and high-performance scientific computing."
url: "https://wajidsiyal.github.io"
baseurl: "/wsiyal.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude files from processing
exclude:
  - node_modules/
  - package.json
  - package-lock.json
  - vite.config.js
  - postcss.config.js
  - tailwind.config.js
  - .gitignore
  - "*.bat"
  - README.md

# GitHub Pages specific
github:
  repository_url: https://github.com/Wajidsiyal/wsiyal.github.io

# Site author
author:
  name: Wajid Siyal
  github: Wajidsiyal
